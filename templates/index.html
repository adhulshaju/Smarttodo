<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTodo Ultra Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020204; --card: rgba(15, 15, 25, 0.7); --border: rgba(255,255,255,0.08);
            --accent: #8b5cf6; --accent-glow: rgba(139, 92, 246, 0.3);
            --text: #ffffff; --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        .mesh { position: fixed; inset: 0; z-index: -1; background: 
            radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%),
            radial-gradient(circle at 100% 100%, #312e81 0%, transparent 50%); }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo { font-family: 'Syne'; font-size: 32px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .app-grid { display: grid; grid-template-columns: 1.6fr 1.1fr; gap: 30px; }

        /* Glassmorphism */
        .glass-card { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); transition: 0.4s; }
        .glass-card:hover { border-color: rgba(255,255,255,0.15); }

        /* Inputs */
        label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
        input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: #fff; outline: none; margin-bottom: 20px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .btn-pro { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-pro:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent); }

        /* Todo Items */
        .todo-item { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid var(--border); animation: slideInUp 0.5s ease-out; }
        .todo-item:last-child { border: none; }
        .check { width: 28px; height: 28px; border-radius: 10px; border: 2px solid var(--accent); cursor: pointer; display: grid; place-items: center; transition: 0.3s; flex-shrink: 0; }
        .check.checked { background: var(--accent); }
        .check.checked::after { content: '✓'; color: #fff; font-weight: bold; }

        .info { flex: 1; }
        .title { font-weight: 600; font-size: 17px; margin-bottom: 4px; }
        .tag { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.05); color: var(--muted); margin-right: 5px; }

        /* Modal Settings */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; place-items: center; z-index: 1000; }

        @media (max-width: 900px) { .app-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="mesh"></div>
    <div class="container animate__animated animate__fadeIn">
        <header>
            <h1 class="logo">Neural.Todo</h1>
            <div style="display:flex; gap:10px;">
                <button onclick="toggleHistory()" class="tag" style="cursor:pointer; padding:10px 20px;">📜 History</button>
                <button onclick="openSettings()" class="tag" style="cursor:pointer; padding:10px 20px;">⚙️ Settings</button>
            </div>
        </header>

        <div class="app-grid">
            <!-- Left: Smart Entry -->
            <div class="pane">
                <div class="glass-card animate__animated animate__fadeInLeft" style="margin-bottom: 25px;">
                    <label>Neural NLP Input</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="ai-input" placeholder="e.g. 'Lunch next Friday afternoon and pay rent day after tomorrow'">
                        <button onclick="parseAI()" class="btn-pro" style="width:auto; padding:0 25px;">✦</button>
                    </div>
                </div>
                <div class="glass-card"><div id="todo-list"></div></div>
            </div>

            <!-- Right: Event Architect (Manual) -->
            <div class="pane">
                <div class="glass-card animate__animated animate__fadeInRight">
                    <h3 style="margin-bottom:20px; font-family:'Syne'">Event Architect</h3>
                    <label>Task Title</label>
                    <input type="text" id="m-title" placeholder="Manual event name">
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div><label>Date</label><input type="date" id="m-date"></div>
                        <div><label>Time</label><input type="time" id="m-time"></div>
                    </div>
                    
                    <label>Scenario Category</label>
                    <select id="m-cat">
                        <option value="meeting">Meeting / Event</option>
                        <option value="work">Work Project</option>
                        <option value="finance">Finance / Bill</option>
                        <option value="health">Health / Gym</option>
                    </select>
                    
                    <button class="btn-pro" onclick="addManual()">Create Neural Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Overlay -->
    <div id="history-overlay" class="overlay" onclick="toggleHistory()">
        <div class="glass-card" style="width:400px;" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:20px;">Archived Tasks</h3>
            <div id="history-list"></div>
            <button class="btn-pro" style="margin-top:20px;" onclick="toggleHistory()">Close</button>
        </div>
    </div>

    <script>
        let todos = JSON.parse(localStorage.getItem('nt_active') || '[]');
        let history = JSON.parse(localStorage.getItem('nt_history') || '[]');

        function save() {
            localStorage.setItem('nt_active', JSON.stringify(todos));
            localStorage.setItem('nt_history', JSON.stringify(history));
            render();
        }

        async function parseAI() {
            const input = document.getElementById('ai-input');
            const res = await fetch('/api/parse', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: input.value})
            });
            const tasks = await res.json();
            todos = [...tasks, ...todos];
            input.value = '';
            if(window.navigator.vibrate) window.navigator.vibrate(60);
            save();
        }

        function addManual() {
            const title = document.getElementById('m-title').value;
            if(!title) return;
            const date = document.getElementById('m-date').value;
            const time = document.getElementById('m-time').value;

            const task = {
                id: Date.now(),
                title: title,
                due_date: date && time ? `${date}T${time}` : null,
                category: document.getElementById('m-cat').value,
                completed: false
            };
            todos.unshift(task);
            save();
        }

        function completeTask(id) {
            const task = todos.find(t => t.id === id);
            history.unshift(task);
            todos = todos.filter(t => t.id !== id);
            if(window.navigator.vibrate) window.navigator.vibrate([40, 30, 40]);
            save();
        }

        function toggleHistory() {
            const overlay = document.getElementById('history-overlay');
            overlay.style.display = overlay.style.display === 'grid' ? 'none' : 'grid';
            renderHistory();
        }

        // Notification Engine
        setInterval(() => {
            const now = new Date().getTime();
            todos.forEach(t => {
                if(t.due_date && !t.reminded) {
                    const taskTime = new Date(t.due_date).getTime();
                    if(taskTime - now < 60000 && taskTime > now) {
                        new Notification(`Neural Reminder: ${t.title}`);
                        t.reminded = true;
                    }
                }
            });
        }, 20000);

        function render() {
            const list = document.getElementById('todo-list');
            list.innerHTML = todos.length === 0 ? '<p style="color:var(--muted); text-align:center;">No neural tasks.</p>' :
            todos.map(t => `
                <div class="todo-item">
                    <div class="check" onclick="completeTask(${t.id})"></div>
                    <div class="info">
                        <div class="title">${t.title}</div>
                        <span class="tag">${t.category}</span>
                        <span class="tag" style="background:rgba(255,255,255,0.02)">📅 ${t.due_date ? new Date(t.due_date).toLocaleString() : 'No Time'}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const hl = document.getElementById('history-list');
            hl.innerHTML = history.map(t => `<div class="todo-item"><div class="info">${t.title}</div></div>`).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            render();
            if(Notification.permission !== 'granted') Notification.requestPermission();
        });
    </script>
</body>
</html>

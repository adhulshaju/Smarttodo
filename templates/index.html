<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTodo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508; --surface: #0f0f15; --card: #161621; --border: #252535;
            --accent: #7c6aff; --accent-glow: rgba(124,106,255,0.4);
            --text: #f0f0f8; --muted: #71718a;
            --high: #ff4d4d; --med: #ffb84d; --low: #4dffb8;
        }
        *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

        .bg-orb { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.15; pointer-events: none; }
        .orb-1 { top: -200px; left: -200px; background: var(--accent); }
        .orb-2 { bottom: -200px; right: -200px; background: #ff6a9b; }

        .container { max-width: 850px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* Stats Grid */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; transition: 0.3s; }
        .stat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .stat-card h3 { font-family: 'Syne'; font-size: 32px; margin-bottom: 4px; }
        .stat-card p { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

        /* AI Input Area */
        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 30px; }
        .nlp-group { display: flex; gap: 15px; }
        .nlp-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; color: white; font-size: 16px; outline: none; min-height: 90px; transition: 0.3s; }
        .nlp-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .add-btn { background: var(--accent); border: none; color: white; font-family: 'Syne'; font-weight: 800; padding: 0 30px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .add-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .ai-preview { margin-top: 15px; font-size: 13px; color: var(--accent); font-weight: 500; display: none; }

        /* Task List */
        .todo-item { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: flex; align-items: center; gap: 18px; margin-bottom: 12px; transition: 0.3s; animation: fadeIn 0.4s ease; }
        .todo-item:hover { background: #1c1c2b; border-color: #353545; }
        .todo-item.completed { opacity: 0.4; filter: grayscale(1); }

        .checkbox { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: 0.2s; display: grid; place-items: center; }
        .checkbox.checked { background: var(--accent); border-color: var(--accent); }
        .checkbox.checked::after { content: '✓'; color: white; font-weight: bold; font-size: 14px; }

        .todo-content { flex: 1; }
        .todo-title { font-size: 17px; font-weight: 500; margin-bottom: 8px; }
        .todo-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .b-priority-high { background: rgba(255,77,77,0.15); color: var(--high); }
        .b-priority-medium { background: rgba(255,184,77,0.15); color: var(--med); }
        .b-cat { background: rgba(124,106,255,0.15); color: var(--accent); }
        .b-date { background: rgba(255,255,255,0.05); color: var(--muted); }
        .b-loc { background: rgba(77,255,184,0.15); color: var(--low); }

        .del-btn { color: var(--muted); cursor: pointer; font-size: 18px; transition: 0.2s; padding: 10px; }
        .del-btn:hover { color: var(--high); }

        .filter-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .f-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .f-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="container">
    <header>
        <div class="logo">Smart<span>Todo</span> Pro</div>
        <button class="f-btn" onclick="clearAll()" style="color: var(--high)">Clear Session</button>
    </header>

    <div class="stats">
        <div class="stat-card"> <h3 id="st-active">0</h3> <p>Active</p> </div>
        <div class="stat-card"> <h3 id="st-done">0</h3> <p>Completed</p> </div>
        <div class="stat-card"> <h3 id="st-over">0</h3> <p>Overdue</p> </div>
        <div class="stat-card"> <h3 id="st-total">0</h3> <p>Total</p> </div>
    </div>

    <div class="input-box">
        <div class="nlp-group">
            <textarea id="nlp-input" class="nlp-input" placeholder="e.g. Schedule meeting with CEO at Starbucks tomorrow 2pm and pay Netflix bill today..."></textarea>
            <button class="add-btn" onclick="processAI()">✦ Add</button>
        </div>
        <div id="ai-preview" class="ai-preview">✦ AI detected 2 tasks...</div>
    </div>

    <div class="filter-row">
        <button class="f-btn active" id="f-all" onclick="setFilter('all')">All Tasks</button>
        <button class="f-btn" id="f-active" onclick="setFilter('active')">Pending</button>
        <button class="f-btn" id="f-done" onclick="setFilter('done')">Completed</button>
    </div>

    <div id="todo-list"></div>
</div>

<script>
    let todos = JSON.parse(localStorage.getItem('pro_todos_v1') || '[]');
    let currentFilter = 'all';

    function save() {
        localStorage.setItem('pro_todos_v1', JSON.stringify(todos));
        render();
    }

    async function processAI() {
        const text = document.getElementById('nlp-input').value;
        if(!text) return;
        
        try {
            const res = await fetch('/api/todos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text })
            });
            const data = await res.json();
            todos = [...data.todos, ...todos];
            document.getElementById('nlp-input').value = '';
            document.getElementById('ai-preview').style.display = 'none';
            save();
        } catch(e) { alert("Server not responding. Check app.py"); }
    }

    function toggle(id) {
        todos = todos.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        save();
    }

    function del(id) {
        todos = todos.filter(t => t.id !== id);
        save();
    }

    function clearAll() { if(confirm('Delete everything?')) { todos = []; save(); } }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('f-' + f).classList.add('active');
        render();
    }

    function render() {
        const list = document.getElementById('todo-list');
        const now = new Date();

        let filtered = todos.filter(t => {
            if(currentFilter === 'active') return !t.completed;
            if(currentFilter === 'done') return t.completed;
            return true;
        });

        list.innerHTML = filtered.map(t => `
            <div class="todo-item ${t.completed ? 'completed' : ''}">
                <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggle(${t.id})"></div>
                <div class="todo-content">
                    <div class="todo-title">${t.title}</div>
                    <div class="todo-badges">
                        <span class="badge b-priority-${t.priority}">${t.priority}</span>
                        <span class="badge b-cat">${t.category}</span>
                        ${t.location ? `<span class="badge b-loc">📍 ${t.location}</span>` : ''}
                        ${t.due_date ? `<span class="badge b-date">📅 ${new Date(t.due_date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>` : ''}
                    </div>
                </div>
                <div class="del-btn" onclick="del(${t.id})">✕</div>
            </div>
        `).join('');

        // Stats Update
        document.getElementById('st-total').innerText = todos.length;
        document.getElementById('st-active').innerText = todos.filter(t => !t.completed).length;
        document.getElementById('st-done').innerText = todos.filter(t => t.completed).length;
        document.getElementById('st-over').innerText = todos.filter(t => t.due_date && new Date(t.due_date) < now && !t.completed).length;
    }

    // AI Preview Logic
    document.getElementById('nlp-input').addEventListener('input', (e) => {
        const text = e.target.value;
        const preview = document.getElementById('ai-preview');
        if(text.length > 10) {
            const count = text.split(/and|then|also|[.!?;]/i).filter(s => s.trim().length > 3).length;
            preview.innerText = `✦ AI will create approx. ${count} tasks...`;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    });

    document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>

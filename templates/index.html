<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTodo — AI-Powered Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ... Keep all your CSS from before ... */
:root {
  --bg: #0a0a0f; --surface: #13131a; --card: #1c1c27; --border: #2a2a3d;
  --accent: #7c6aff; --accent2: #ff6a9b; --accent3: #6affd4; --text: #f0f0f8;
  --muted: #7070a0; --high: #ff5a5a; --med: #ffb84d; --low: #4dffb8;
  --r: 14px; --r-sm: 8px; --shadow: 0 8px 32px rgba(0,0,0,.45);
}
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; overflow-x: hidden; }
.bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index:0; }
.bg-orb-1 { width:500px;height:500px;top:-100px;left:-150px;background:radial-gradient(circle,rgba(124,106,255,.18),transparent 70%); }
.bg-orb-2 { width:400px;height:400px;bottom:-80px;right:-100px;background:radial-gradient(circle,rgba(255,106,155,.14),transparent 70%); }
.app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 80px; }
header { padding: 32px 0 24px; display: flex; align-items: center; justify-content: space-between; }
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { width:40px; height:40px; border-radius:12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display:grid; place-items:center; font-size:20px; box-shadow: 0 4px 16px rgba(124,106,255,.4); }
.logo-text { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
.logo-text span { color: var(--accent); }
.stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; }
.stat-num { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; margin-top:4px; }
.stat-card.pending .stat-num { color:var(--accent); }
.stat-card.done .stat-num { color:var(--accent3); }
.stat-card.overdue .stat-num { color:var(--high); }
.input-section { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:20px; margin-bottom:20px; }
.input-tabs { display:flex; gap:8px; margin-bottom:16px; }
.tab-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); border-radius:var(--r-sm); padding:7px 16px; font-size:13px; cursor:pointer; }
.tab-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.nlp-wrap { display:flex; gap:10px; align-items:flex-end; }
.nlp-input { flex:1; background:var(--surface); border:1.5px solid var(--border); color:var(--text); border-radius:var(--r-sm); padding:14px 16px; font-size:15px; outline:none; min-height:80px; }
.add-btn { background:linear-gradient(135deg, var(--accent), var(--accent2)); border:none; color:#fff; border-radius:var(--r-sm); padding:14px 24px; font-family:'Syne',sans-serif; font-weight:700; cursor:pointer; }
.manual-form { display:none; }
.manual-form.active { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-field { display:flex; flex-direction:column; gap:6px; }
.form-field.full { grid-column:1/-1; }
.form-field input, .form-field select, .form-field textarea { background:var(--surface); border:1.5px solid var(--border); color:var(--text); border-radius:var(--r-sm); padding:10px 14px; outline:none; }
.filter-bar { display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:20px; padding:6px 14px; font-size:13px; cursor:pointer; }
.filter-btn.active { background:var(--accent); color:#fff; }
.sort-select { margin-left:auto; background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:var(--r-sm); }
.todo-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px; display:flex; gap:14px; margin-bottom:10px; transition:0.2s; }
.todo-card.completed { opacity:0.5; }
.todo-check { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); cursor:pointer; display:grid; place-items:center; }
.todo-check.done { background:var(--accent3); border-color:var(--accent3); }
.todo-check.done::after { content:'✓'; color:#000; font-size:12px; font-weight:bold; }
.todo-body { flex:1; }
.todo-title { font-weight:500; margin-bottom:4px; }
.badge { font-size:11px; padding:2px 8px; border-radius:10px; margin-right:4px; font-weight:500; }
.badge-priority-high { background:rgba(255,90,90,0.15); color:var(--high); }
.badge-category { background:rgba(124,106,255,0.1); color:var(--accent); }
.todo-actions { display:flex; gap:6px; }
.icon-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); width:28px; height:28px; display:grid; place-items:center; border-radius:4px; cursor:pointer; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; place-items:center; z-index:100; }
.overlay.open { display:grid; }
.modal { background:var(--card); padding:24px; border-radius:var(--r); width:90%; max-width:500px; }
.toast-wrap { position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:8px; }
.toast { background:var(--card); border:1px solid var(--accent3); padding:12px 20px; border-radius:8px; animation: slideIn 0.3s; }
@keyframes slideIn { from { transform:translateX(100%); } to { transform:translateX(0); } }
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="app">
  <header>
    <div class="logo"><div class="logo-icon">✦</div><div class="logo-text">Smart<span>Todo</span></div></div>
    <div class="view-toggle">
        <button class="view-btn active" onclick="setView('list')">☰</button>
        <button class="view-btn" onclick="setView('grid')">⊞</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card pending"><div class="stat-num" id="s-pending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card done"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
    <div class="stat-card overdue"><div class="stat-num" id="s-overdue">0</div><div class="stat-label">Overdue</div></div>
  </div>

  <div class="input-section">
    <div class="input-tabs">
      <button class="tab-btn active" onclick="switchTab('nlp')">✦ Smart Input</button>
      <button class="tab-btn" onclick="switchTab('manual')">＋ Manual</button>
    </div>
    <div id="nlp-panel">
      <div class="nlp-wrap">
        <textarea class="nlp-input" id="nlp-input" placeholder="e.g. Meet John tomorrow at 3pm..."></textarea>
        <button class="add-btn" id="nlp-btn" onclick="submitNLP()">✦ Add Tasks</button>
      </div>
    </div>
    <div class="manual-form" id="manual-panel">
      <div class="form-field full"><input type="text" id="m-title" placeholder="Task Title"></div>
      <div class="form-field"><input type="datetime-local" id="m-due"></div>
      <div class="form-field">
        <select id="m-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
      </div>
      <button class="add-btn" style="grid-column: 1/-1" onclick="submitManual()">＋ Add Task</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Done</button>
    <select class="sort-select" onchange="setSort(this.value)">
        <option value="upcoming">Upcoming</option>
        <option value="priority">Priority</option>
    </select>
  </div>

  <div id="todos-grid"></div>
</div>

<div class="toast-wrap" id="toasts"></div>

<div class="overlay" id="edit-overlay">
    <div class="modal">
        <h3>Edit Task</h3>
        <input type="text" id="e-title" style="width:100%; margin-bottom:10px; padding:10px;">
        <button class="add-btn" onclick="saveEdit()">Save</button>
        <button class="tab-btn" onclick="document.getElementById('edit-overlay').classList.remove('open')">Cancel</button>
    </div>
</div>

<script>
let todos = JSON.parse(localStorage.getItem('smart_todos') || '[]');
let filter = 'all';
let sort = 'upcoming';
let view = 'list';
let editingId = null;

function save() { 
    localStorage.setItem('smart_todos', JSON.stringify(todos)); 
    render(); 
}

async function submitNLP() {
    const text = document.getElementById('nlp-input').value;
    const res = await fetch('/api/todos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text })
    });
    const data = await res.json();
    todos = [...todos, ...data.todos];
    document.getElementById('nlp-input').value = '';
    save();
}

function submitManual() {
    const title = document.getElementById('m-title').value;
    if(!title) return;
    const newTask = {
        id: Date.now(),
        title: title,
        priority: document.getElementById('m-priority').value,
        due_date: document.getElementById('m-due').value,
        completed: false,
        category: 'general'
    };
    todos.push(newTask);
    save();
}

function toggleTodo(id) {
    todos = todos.map(t => t.id === id ? {...t, completed: !t.completed} : t);
    save();
}

function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
}

function render() {
    const grid = document.getElementById('todos-grid');
    let filtered = todos.filter(t => {
        if(filter === 'active') return !t.completed;
        if(filter === 'completed') return t.completed;
        return true;
    });

    // Simple Sort
    if(sort === 'priority') {
        const pMap = {high: 0, medium: 1, low: 2};
        filtered.sort((a,b) => pMap[a.priority] - pMap[b.priority]);
    } else {
        filtered.sort((a,b) => new Date(a.due_date || 0) - new Date(b.due_date || 0));
    }

    grid.innerHTML = filtered.map(t => `
        <div class="todo-card ${t.completed ? 'completed' : ''}">
            <div class="todo-check ${t.completed ? 'done' : ''}" onclick="toggleTodo(${t.id})"></div>
            <div class="todo-body">
                <div class="todo-title">${t.title}</div>
                <span class="badge badge-priority-${t.priority}">${t.priority}</span>
                <span class="badge">${t.due_date ? new Date(t.due_date).toLocaleDateString() : 'No date'}</span>
            </div>
            <div class="todo-actions">
                <div class="icon-btn" onclick="deleteTodo(${t.id})">✕</div>
            </div>
        </div>
    `).join('');

    // Update Stats
    document.getElementById('s-total').innerText = todos.length;
    document.getElementById('s-pending').innerText = todos.filter(t => !t.completed).length;
    document.getElementById('s-done').innerText = todos.filter(t => t.completed).length;
    document.getElementById('s-overdue').innerText = todos.filter(t => t.due_date && new Date(t.due_date) < new Date() && !t.completed).length;
}

function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
}

function setSort(s) { sort = s; render(); }

function switchTab(t) {
    document.getElementById('nlp-panel').style.display = t === 'nlp' ? 'block' : 'none';
    document.getElementById('manual-panel').style.display = t === 'manual' ? 'grid' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
